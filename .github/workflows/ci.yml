name: CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hexlet-components/hello-from-hexlet-action@release

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup project
        run: make setup

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test
